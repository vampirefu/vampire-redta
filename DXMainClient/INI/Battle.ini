[SOVMD01]
Scenario=SOV01UMD.MAP
BuildOffAlly=yes
Description=苏军任务1——时空转移
LongDescription=军事行动：时空转移@地点：加州，旧金山@世界分崩离析。尤里仍然安然自处的统治并无人能敌。只有尝试联军的大胆计划，实时将时间回到尤里开始阴谋和完全统治之间。@@任务目标一：摧毁盟军海军和巨炮。@任务目标二：摧毁时间机器四周的机枪碉堡，并占领时间机器。@任务目标三：占领四座电厂供时间机器使用。@任务目标四：掌控苏联基地并使用它摧毁心灵控制器。
