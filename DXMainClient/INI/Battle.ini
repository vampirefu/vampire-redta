Description=苏军任务3——洗脑行动
LongDescription=军事行动：洗脑行动@地点：英国，伦敦@盟军已经在英国伦敦发现了一座心灵控制器，尤里已经控制了盟军的攻击部队，以替他防守这座接近完成的心灵控制器；解救这些盟军，并联合他们一起打败尤里，但请注意，这座控制器可能随时都会启动运转。@任务目标一：摧毁心灵信标。@任务目标二：摧毁心灵控制器。@任务目标三：解决尤里的部队。
