LongDescription=军事行动：似曾相识@地点：德国，黑森林@就是在黑森林这附近，我们由于爱因斯坦超时空传送仪的出现，而败给了盟军；这一次，我们不能再失败了！摧毁爱因斯坦的实验室和其超时空传送仪，以便确保与盟军的战争，获得属于我苏联伟大的胜利。@@任务目标一：摧毁守护德国边界的前哨站。@任务目标二：摧毁爱因斯坦的实验室与超时空传送仪。
