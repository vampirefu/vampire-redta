LongDescription=军事行动：攻打台湾海峡@地点：中国，金门岛@随着蔡英文上台，台湾当局独立的野心日益膨胀。2022年8月2日晚上10点37分，佩洛西窜台，中国大陆决定在8月4日至10日在台湾省附近实行军事演练，压一压台独的气焰......@@任务目标一：建立基地；@任务目标二：消灭沿海部队。
