LongDescription=军事行动：台北之战@地点：中国，台北@我军突破台的沿海防线后，势如破竹般直冲台湾的心脏——台北，解决台军主力在此一举。可是有人竟准备把我军的进攻路线和军事机密告诉蔡英文，中央决定先派突袭小分队对其进行处决。@@任务目标一：将泄密人员处决（站在运动场中间）@任务目标二：建立基地；@任务目标三：消灭岛内主要力量。
