SideName=Yuri

[SKYX05]
Scenario=SKYX05.MAP
BuildOffAlly=yes
Description= 尤里任务5——红色覆灭
LongDescription=军事行动：红色覆灭@尤里回到现在后发现历史已被更改：由于苏联比美国提前研制出原子弹，现在已成为世界上的大国。@@任务目标一：在莫斯科附近登陆。@任务目标二：摧毁圣巴索大教堂。
SideName=Yuri

[SKYX06]
Scenario=SKYX06.MAP
BuildOffAlly=yes
Description=尤里任务6——自由倒塌
LongDescription=军事行动：自由倒塌@苏联被我们入侵后，总理乘专机逃到了美国，中途已被我们的防空部队拦截，现在纽约附近紧急迫降。在他与美军回合之前杀了他！并且摧毁纽约的标志--自由女神像。@@任务目标一：杀死苏联总理。@任务目标二：摧毁自由女神像。
SideName=Yuri

[SKYX07]
Scenario=SKYX07.MAP
BuildOffAlly=yes
Description=尤里任务7——巅峰决战
LongDescription=军事行动：巅峰决战@我们得到消息，苏联和美国的顶尖科学家将会一起乘车前往秘密基地研究对付我们的武器。让我们在中途把他们截杀吧！@@任务目标一：杀死科学家们。@任务目标二：消灭敌人所有部队。
SideName=Yuri

[SKYX08]
Scenario=SKYX08.MAP
BuildOffAlly=yes
Description=尤里任务8——东山再起
LongDescription=军事行动：东山再起@苏联和美国一同消灭尤里后，世界重新恢复和平。为了防止尤里复出，苏联人和美国人把他关在了心灵隔离室，并对尤里岛进行了军事占领。谁知道，尤里哪是那么容易被消灭的！他秘密召唤了他的残余部队，并制定了周密的计划，并设想利用时间机器，重新建立起他那庞大的帝国，并完成复仇，实现他统治世界的梦想！现在，出发！@@任务目标一：摧毁巨炮，迎接两栖运输艇。@任务目标二：解决掉敌人岸上的防御部队，使部队能安全登陆。@任务目标三：消灭盟军在时间机器周围的防御部队，启动时间机器。@任务目标四：打破笼子，解救尤里。
SideName=Yuri

[SKYX09]
Scenario=SKYX09.MAP
BuildOffAlly=yes
Description=尤里任务9——空中危机
LongDescription=军事行动：空中危机@我们找到了一座废弃的基地，但是我们没有一分钱。我们需要金钱来维持我们庞大的战争机器。以前，我们就曾败在了盟军的空军手下。如今，那些讨厌的飞机、伞兵以及飞行兵又来侵犯我们的领地。我们绝不允许这样的行径！一定要找到充足的经济来源，再干掉那些讨厌的美国苍蝇们的破机场！@ @任务目标一：修复尤里建造厂。@任务目标二：占领油井，获取资金。@任务目标三：建立一座心灵感应器。@任务目标四：保卫三座尤里雕像。@任务目标五：摧毁所有盟军的机场。
SideName=Yuri

[SKYX10]
Scenario=SKYX10.MAP
BuildOffAlly=yes
Description=尤里任务10——战鹰末日
LongDescription=军事行动：战鹰末日@为了彻底解决美国空军，我们来到了位于科罗拉多州的美国空军学院。美国空军学院是美国空军培养初级指挥军官的院校。为军队培养出多名著名空军军官和优秀飞行员，数十年来一直是美国军方的骄傲。但是，它即将成为我们的骄傲！今天，指挥官，我们要占领美国空军学院，并在那里建立永久的防御！美国人，等死吧！@@任务目标一：摧毁美国人的前哨站。@任务目标二：用工程师占领空军学院礼拜堂。@任务目标三：保护空军学院礼拜堂。
SideName=Yuri

[SKYX11]
Scenario=SKYX11.MAP
BuildOffAlly=yes
Description=尤里任务11——秘密集结
LongDescription=军事行动：秘密集结@美国空军投降了，然而美国海军仗著雄厚的军力继续对抗。同时，他们联合了苏联，准备在日本集结，偷袭尤里岛。但是尤里也得知了这个情报，于是准备在日本的横滨截击苏联军队和美国海军。我们还从没有和苏联军队真正交过手，所以他们已经在我们不知情的情况下动用了秘密武器。我们的前线基地已经丢失，只有一个人逃出来了。夺回你的基地，血洗东京湾！@ @任务目标一：夺回我们的基地。@任务目标二：坚守你的阵地。@任务目标三：摧毁天气控制器。@任务目标四：摧毁苏联和美国的建造厂。
SideName=Yuri

[SKYX12]
Scenario=SKYX12.MAP
BuildOffAlly=yes
Description=尤里任务12——临阵脱逃
LongDescription=军事行动：临阵脱逃@指挥官，你明智的指挥使我们的攻势势如破竹，已经占领了大半个欧洲，并对苏联形成两面包围之势。经过一番紧张的讨论，苏联总理和美国总统一同来到了位于荷兰鹿特丹的卫星发射基地，准备乘火箭到月球避难。这正是一个抓捕他们的好机会！我们的飞碟已经飞到鹿特丹的上空，防空警报叠起......@@任务目标一：派工程师占领登月火箭发射器。
SideName=Yuri

[SKYX13]
Scenario=SKYX13.MAP
BuildOffAlly=yes
Description=尤里任务13——反目成仇
LongDescription=军事行动：反目成仇@指挥官，最坏的事情发生了。尤里认为苏联和美国已经被消灭，而你成为了他统治世界最大的障碍。指挥官，只有唯一的机会，就是同仅剩一口气的苏联、美国合作，一同对付尤里......尤里的大批军队已经向你的基地靠近！还等什么，指挥官，动手吧！不要手下留情！@@任务目标一：坚守你的阵地，直到苏联援军到达。@任务目标二：寻找苏联基地。@任务目标三：摧毁或占领尤里的心灵信标。
SideName=Yuri

[SKYX14]
Scenario=SKYX14.MAP
BuildOffAlly=yes
Description=尤里任务14——雪地游击
LongDescription=军事行动：雪地游击@据我们的最新情报显示，尤里将会乘豪华轿车从西伯利亚山区经过。可是，我们的部队先到了这里.......伏击他，让他和他的罪恶一同消失在世界上！@ @任务目标一：摧毁尤里的豪华轿车。@任务目标二：派动员兵进入通讯中心，查找鲍里斯的位置。@任务目标三：查找尤里的下落。
SideName=Yuri

