[LD101]
Scenario=LD101.MAP
BuildOffAlly=yes
Description=欧盟任务01——海狮与翠鸟
LongDescription=军事行动：海狮与翠鸟@地点：英国，朴茨茅斯@苏维埃的铁蹄已经践踏了整个欧洲大陆，不列颠也许是整个自由世界最后的希望。警报终于在整个大不列颠上空鸣响。我们知道他们会来，但没想到来得这么快。我们的最后堡垒——伦敦要塞需要更多的时间来准备，你负责把进攻的苏军拖在朴茨茅斯港。@ @任务目标一：至少保留一座建造厂，直到伦敦要塞准备完毕。@任务目标二：继续战斗，直到流尽最后一滴血。
SideName=Allied

[LD102]
Scenario=LD102.MAP
BuildOffAlly=yes
Description=欧盟任务02——完美假日
LongDescription=军事行动：完美假日@地点：法国，嘎纳@我们在朴茨茅斯的防御行动使苏联不得不暂时放弃进攻英国的计划。为此我们得到了喘息的机会，并可以趁机反攻欧洲大陆。据可靠消息，苏联的罗曼诺夫总理正在法国嘎纳度假。如果我们能够劫持他，说不定能起到事半功倍的效果。@@任务目标一：潜入并劫持罗曼诺夫。@任务目标二：摧毁控制罗曼诺夫的心灵信标。@任务目标三：让罗曼诺夫总理登上直升机并撤离。@任务目标四：消灭嘎纳的全部敌对势力。
SideName=Allied

[LD103]
Scenario=LD103.MAP
BuildOffAlly=yes
Description=欧盟任务03——政治家行动
LongDescription=军事行动：政治家行动@地点：埃及，塞得港@幕后黑手已经十分明确，是有心灵控制超能力的尤里在背后操纵着一切。这个野心家先是蒙骗了苏联人，又踏平了美国，现在又试图占据整个欧洲。根据罗曼诺夫提供的情报，尤里正在把一批研制成功的基因武器从苏伊士运河转运到地中海，进而送进欧洲。我们绝不能允许这种灾难性的事情发生。可是我们在北非没有任何成型的军事力量。一切只能靠盟军最好的特工——谭雅了。@@任务目标一：摧毁威胁谭雅的基因突变器。@任务目标二：击沉塞得港内剩余的货轮。@任务目标三：不能让任何一艘货轮离开塞得港。@任务目标四：谭雅不能阵亡。
SideName=Allied

[LD104]
Scenario=LD104.MAP
BuildOffAlly=yes
Description=欧盟任务04——天际线
LongDescription=军事行动：天际线@地点：埃及，吉萨@我们在塞得港的成功行动可以使我们在北非进行更加冒险的计划，比如说，拯救一种可能扭转战争局势的秘密武器。盟军北非军团已经被心灵信标控制。位于吉萨的起源科技实验室在检测到了心灵波影响后开启了自毁程序。我们的突击小队如果能及时赶到阻止它的自毁，就能重新启用起源科技实验室中的秘密武器。@@任务目标一：护送基地车靠近实验室，解除其自毁指令。@任务目标二：不能让任何一个尤里部队靠近实验室。@任务目标三：消灭所有尤里在吉萨的部队。
SideName=Allied


[LD105]
Scenario=LD105.MAP
BuildOffAlly=yes
Description=欧盟任务05——和平主义
LongDescription=军事行动：和平主义@地点：比利时，布鲁塞尔@尤里的部队已经撤出北非，我们可以以北非为基地反攻欧洲。我们已经重新启用布鲁塞尔的军事基地，然而尤里在这里部署了核武器，这对我们造成了极大威胁。@@任务目标一：在核攻击中保护原子球。@任务目标二：解除布鲁塞尔的核威胁。
SideName=Allied

[LD106]
Scenario=LD106.MAP
BuildOffAlly=yes
Description=欧盟任务06——冻洋
LongDescription=军事行动：冻洋@地点：北海@尤里已经控制整个欧洲大陆。欧洲联盟军被迫撤到海上。通过对布鲁塞尔心灵信标所发出信号的分析，我们已经确定了整个欧洲的心灵控制网络的中枢在敖德萨。如果有超时空传送器的话，我们就可以立即对那里发动突袭了。所以，我们需要一座超时空传送器。@@任务目标一：寻找合适的登陆地点。@任务目标二：建立并保护超时空传送器。@任务目标三：解除周围海军基地的造成的威胁。
SideName=Allied

[LD107]
Scenario=LD107.MAP
BuildOffAlly=yes
Description=欧盟任务07——铜墙铁幕（上）
LongDescription=军事行动：铜墙铁幕@地点：乌克兰，敖德萨@我们终于来到了敖德萨。在这里，被心灵控制的苏联铁幕项目负责人林德拉克正在研制最新的科技。我们虽然不知道那种科技是什么，但是我们必须把它弄到手，因为它不论落到谁手中，都可能是最后的王牌。@@任务目标一：占领并保护四座铁幕装置。@任务目标二：在心灵控制增幅器启动前，摧毁它。@任务目标三：苏联建造厂不能被摧毁。
SideName=Allied

[LD108]
Scenario=LD108.MAP
BuildOffAlly=yes
Description=苏联任务08——铜墙铁幕（下）
LongDescription=军事行动：铜墙铁幕@地点：乌克兰，敖德萨@在欧洲盟友的帮助下，在敖德萨进行铁幕科技研究的苏军部队脱离了尤里的心灵控制。但是，尤里的镇压部队正在赶来。虽然罗曼诺夫已经前往黑海重新召集舰队，敖德萨仍然处于危险的包围之中。林德拉克决定，先测试手头的铁幕武器。实战就是最好的测试，对吧？@@任务目标一：保护四座铁幕装置。不能损失任何一座。@任务目标二：消灭被心灵控制的欧洲联盟友军。
SideName=Soviet

[LD109]
Scenario=LD109.MAP
BuildOffAlly=yes
Description=苏联任务09——拜占庭商人
LongDescription=军事行动：拜占庭商人@地点：土耳其，伊斯坦布尔@由于心灵控制器的影响，敖德萨不宜久留。林德拉克已经带领全部还没有被控制的苏军部队撤出敖德萨。至于下一步去哪里，情况是显然的：苏军的黑海舰队将全军攻击土耳其的伊斯坦布尔要塞。在这里，也许能找到下一步该怎么做的答案。@@任务目标一：等待黑海舰队在博斯普鲁斯海峡集结。@任务目标二：清除超时空传送器周围的卫队。@任务目标三：林德拉克不能阵亡。
SideName=Soviet

[LD110]
Scenario=LD110.MAP
BuildOffAlly=yes
Description=苏联任务10—— 冰点
LongDescription=军事行动： 冰点@地点：苏联，莫斯科@是时候再进行一次红色革命了，指挥官。人民的叛徒，那个欺骗了所有人的叛徒——尤里，正躲藏在克里姆林宫中，让我们看看他还能在这个位子上坐多久吧！@@任务目标一：占领克里姆林宫。
SideName=Soviet

[LD111]
Scenario=LD111.MAP
BuildOffAlly=yes
Description=苏联任务11——太阳鸟
LongDescription=军事行动：拜占庭商人@地点：中国，哈尔滨@尤里从克里姆林宫逃走了，我们不知道他去了哪里，但是一定不会去欧洲，那里到处都是我们的朋友。所以我们推测尤里可能逃往远东，或者亚洲。正好，我们接到来自中国的特工——天枢的紧急情况报告：他发现哈尔滨有一座心灵信标。我们有必要去看一看那里是什么情况。@@任务目标一：破坏太阳岛上的心灵信标。@任务目标二：使用天枢骇入心灵控制器。@任务目标三：天枢不能阵亡。
SideName=Soviet

[LD112]
Scenario=LD112.MAP
BuildOffAlly=yes
Description=苏联任务12——樱之陨落
LongDescription=军事行动：樱之陨落@地点：日本，东京@天枢骇入了哈尔滨的心灵控制器，追查到心灵控制器的后台控制程序在东京。我们推测尤里就躲藏在这里。东京港戒备森严，以我们目前的军力去贸然进攻并不是很稳妥。但是，如果我们能把东京塔变成一座巨大的磁暴线圈的话……@@任务目标一：使用磁暴步兵磁化东京塔。@任务目标二：在指定地点建立基地。@任务目标三：消灭东京湾的所有敌人。
SideName=Soviet

[LD113]
Scenario=LD113.MAP
BuildOffAlly=yes
Description=苏联任务13——天问
LongDescription=军事行动：天问@地点：中国，西昌卫星发射中心@我们被骗了！尤里已经通过东京的超时空传送器逃离，此时尤里已经从中国西昌乘坐登月火箭逃往月球。在西昌卫星发射中心，还有更多的登月火箭等待发射，准备向月球输送更多的武器与科技。还好天枢的情报网络发现了尤里诡计的端倪。林德拉克和天枢这次会并肩作战，一同阻止尤里那疯狂的计划。@@任务目标一：不能让任何一座登月火箭发射。@任务目标二：至少夺取一座火箭发射台。@任务目标三：林德拉克和天枢必须存活。
SideName=Soviet

[LD114]
Scenario=LD114.MAP
BuildOffAlly=yes
Description=苏联任务14——时间之握
LongDescription=军事行动：时间之握@地点：月球，风暴洋@终于来到最后的战场了。尤里在月球的防御非常坚固，完全是末日避难所等级的，我们不能掉以轻心。另外我们还在这里发现了在起源科技实验室中曾经提到的时间科技，不知尤里是从哪里搞到的它……但是这一切都快结束了！夺回这项科技，让叛徒得到应有的归宿吧！@@任务目标一：寻找合适的位置以传送基地车。@任务目标二：占领时间机器。@任务目标三：保护时间机器，直到时间轴纠正。
SideName=Soviet

[LDLK2]
Description=----林德拉克计划2：命运之瞳----

[LD201]
Scenario=LD201.MAP
BuildOffAlly=yes
Description=尤里任务01——胜利日
LongDescription=军事行动：胜利日@地点：苏联，列宁格勒@罗曼诺夫总理正在列宁格勒举办胜利日阅兵，届时整个苏维埃所有的重要人物都会出席。这正是一个把他们一网打尽的好机会。控制他们的心灵，支配他们的意志，让主人开心。@@任务目标一：保证阅兵式不被干扰。@任务目标二：使用工程师启动心灵信标。@注意：任何己方或者敌方的部队进入阅兵区域，都会导致阅兵式被干扰。@注意：我们的目标是心控所有苏军高级官员，请不要摧毁他们所在的大教堂。
SideName=Yuri

[LD202]
Scenario=LD202.MAP
BuildOffAlly=yes
Description=尤里任务02——庆功宴
LongDescription=军事行动：庆功宴@地点：乌克兰，塞瓦斯托波尔@我们发现一名精英科学家林德拉克并未参加列宁格勒的胜利日阅兵而逃脱了我们的心灵控制。我们所知道的最后的消息是，他在塞瓦斯托波尔休假。他也许察觉到了什么，也许没有。但他似乎受过抵抗心灵控制的训练，手里还掌握着威力巨大的铁幕武器，我们应该迅速的把他清除。@@任务目标一：摧毁所有船坞，并击沉港口内所有货轮。@任务目标二：摧毁或占领机场，并摧毁港口内所有运输直升机。@任务目标三：不能让任何一艘货轮或运输直升机离开港口。
SideName=Yuri

[LD203]
Scenario=LD203.MAP
BuildOffAlly=yes
Description=尤里任务03——雅典娜之怒
LongDescription=军事行动：雅典娜之怒@地点：希腊，雅典@我们在塞瓦斯托波尔的隐秘行动惊动了欧盟，使得他们把我们看做比苏维埃更大的威胁。一定是有谁泄露了情报，看来我们之中也许有内鬼。且不管这些，更重要的是，威灵顿将军和麦斯维尔将军已经在雅典集结了盟军有史以来最庞大的一支军队，准备通过超时空前来攻击我们。@主动出击，给他们一点颜色瞧瞧！@@任务目标一：清理登陆区并建立一座基地。@任务目标二：摧毁胜利女神像。@任务目标三：摧毁或控制北海巨妖和泰坦机甲。@任务目标四：摧毁超时空传送仪。@任务目标五：摧毁起源科技实验室。@提示：静滞力场会使我方建筑失效，空军坠毁，潜艇失联，装甲部队和舰船不能移动，只有步兵正常。
SideName=Yuri

[LD204]
Scenario=LD204.MAP
BuildOffAlly=yes
Description=尤里任务04——血之契约
LongDescription=军事行动：血之契约@地点：罗马尼亚，德古拉要塞@心灵感应器侦测到主人位于罗马尼亚要塞的亲卫部队出现了异常。虽然主人一直与我们保持密切联络，但我们没法联络上卫队。@如果他们被盟军收买，那真是最坏最坏的一种情况了。我们必须不惜一切代价保护主人。@@任务目标一：前往德古拉要塞支援。@任务目标二：护送尤里X到达集结点。@任务目标三：尤里X不能阵亡。
SideName=Yuri

[LD205]
Scenario=LD205.MAP
BuildOffAlly=yes
Description=尤里任务05——不稳定同盟
LongDescription=军事行动：不稳定同盟@地点：日本，福井@我们与日本的科学家们达成了一项临时协议，由他们帮助我们制造最新的武器系统、“空中的心灵控制器”——命运之瞳，而我们会与他们共享一部分基因技术。@当然，我们早就做好了撕毁协议的准备。一旦“命运之瞳”计划完工，我们就可以把他们一并消灭掉。@中国军队已经注意到了福井港口的异常，并发射了巡航导弹试图攻击我们的研究设施。我们不会让他们得逞的。@@任务目标一：保护心灵控制器，直到新科技研发完成。@任务目标二：消灭所有敌对势力。@任务目标三：命运之瞳不能被摧毁。
SideName=Yuri

[LD206]
Scenario=LD206.MAP
BuildOffAlly=yes
Description=尤里任务06——铁幕降临
LongDescription=军事行动：铁幕降临@地点：苏联，新西伯利亚@逃跑的林德拉克终于现身了。他已经在新西伯利亚集结了一大批部队，试图阻截飞向北极点的命运之瞳。@我们所剩的时间不多了。为了保证命运之瞳按时达到北极点，与全球心灵控制网络连接，必须让它马不停蹄的前进。@林德拉克会使用铁幕技术让他的防线坚不可摧，但是我们必须和他们硬碰硬了。@@任务目标一：等待命运之瞳到达，并集结一支部队。@任务目标二：护送命运之瞳通过此区域。
SideName=Yuri

[LD207]
Scenario=LD207.MAP
BuildOffAlly=yes
Description=尤里任务07——安魂曲（上）
LongDescription=军事行动：安魂曲@地点：中国，雅鲁藏布江大峡谷@全球心灵控制网络在试图启动的时候，因为受到了严重的黑客攻击而瘫痪了。我们之前的所有努力付诸东流了。@一名中国黑客——天枢，公开宣布对此事件负责。这种挑衅的行为完全无法容忍。@虽然我们迅速的启动控制网络的计划已经败露，但天枢仍然是我们最大的威胁。除掉他！@@任务目标：找到并杀死天枢。
SideName=Yuri

[LD208]
Scenario=LD208.MAP
BuildOffAlly=yes
Description=中国任务08——安魂曲（下）
LongDescription=军事行动：安魂曲@地点：中国，雅鲁藏布江大峡谷@我们在雅鲁藏布江大峡谷有三座军事基地失联了，我们所知道的最后的消息是，他们遭遇了敌人，势力不明，数量不明。@虽然十分危险，突击队员天权主动请求作为先头部队进行调查。据他所说，他的弟弟也在一座失联的基地里。@@任务目标一：调查三座失联的基地。@任务目标二：护送天权前往通讯中心，把加密信息传出。
SideName=China

[LD209]
Scenario=LD209.MAP
BuildOffAlly=yes
Description=中国任务09——难以相信的朋友
LongDescription=军事行动：难以相信的朋友@地点：苏联，符拉迪沃斯托克@对天枢阵亡一事我们感到十分心痛。鉴于他已经被情报机构除名，他对战局应该影响不大。我们会继续监控尤里部队的动向。但是此时此刻，曾经擅自对哈尔滨采取军事行动的苏联才是对我们最大的威胁。@我们会出动地面部队先发制人进攻符拉迪沃斯托克，这样可以大幅削弱苏联海军对远东地区的控制，确保我们的安全。@@任务目标一：突袭符拉迪沃斯托克的苏联基地。@任务目标二：护送林德拉克前往机场。@任务目标三：林德拉克不能阵亡。
SideName=China

[LD210]
Scenario=LD210.MAP
BuildOffAlly=yes
Description=中国任务10——疯狂赌徒
LongDescription=军事行动：疯狂赌徒@地点：中国，澳门@并非所有城市都像哈尔滨那样幸运。我们从尤里那里购买的第一批心灵信标部署在澳门，它们已经启动并且控制了我们一部分军队。林德拉克及时的警示了我们这一点。@所幸事情没有变得那么无法挽回：心灵信标需要一些时间才能继续加大功率扩大控制范围。这是我们的机会，破坏尤里的阴谋在此一举！@@任务目标一：摧毁心灵信标，解救基地。@任务目标二：阻止心灵信标的过载。@任务目标三：消灭澳门的全部尤里势力。@提示：每摧毁一座心灵信标，过载时间都会延后。全部心灵信标都被摧毁以后，过载就会终止。
SideName=China

[LD211]
Scenario=LD211.MAP
BuildOffAlly=yes
Description=中国任务11——十一个矮人
LongDescription=军事行动：十一个矮人@地点：中国，绵阳核子研究中心@尤里认为我们的核武器威力巨大，并想要得到它们。绵阳核子研究中心已经被数十倍的敌人团团包围。我们的科学家们大部分已经通过直升机撤离，但是生产设备和军事力量已经无法转移了，我们处于非常被动的局面！@天子仁将军提出了一个大胆的计划：使用快中子注入装置生产大量的钚-239，等到富集足够多以后，就用这些钚-239制造一场大爆炸，炸平整座城市，与敌人同归于尽。@@任务目标一：保护至少一座快中子注入装置，直到转化足够量的钚。@任务目标二：不能让尤里占领任何一座快中子注入装置。@任务目标三：引爆所有的快中子注入装置，与敌人同归于尽。@注意：敌人不会攻击快中子注入装置，但是会尝试占领它们。当你无法保护时，请亲手炸毁。@注意：有几座快中子注入装置在地图上，右下角的剩余时间就会以几倍速度流逝。
SideName=China

[LD212]
Scenario=LD212.MAP
BuildOffAlly=yes
Description=中国任务12——蛰龙
LongDescription=军事行动：蛰龙@地点：韩国，釜山@根据从天枢身上芯片中解密的情报，我们及时的赶到了釜山，抢到了尤里还没来得及销毁的，“最终意志”计划的一些研究设备。@但尤里却不甘心于自身计划败露，出动了大批海军部队封锁了釜山港口，以阻止我们将设备运出。@我们已经将一部分数字化的资料传回，但这批设备仍然弥足珍贵，对于我们破解尤里的阴谋计划具有极大意义。@@任务目标一：护送至少一艘货轮到撤离点。@任务目标二：消灭此地区的尤里势力。@提示：天权可以搭乘雌鹿运输直升机，在复杂地形中更加灵活的引导巡航导弹轰炸。
SideName=China

[LD213]
Scenario=LD213.MAP
BuildOffAlly=yes
Description=中国任务13——不知火
LongDescription=军事行动：不知火@地点：日本，名古屋@我们航拍到日本名古屋有大量异乎寻常的生产设备。有证据表明尤里正在这里对泰坦机甲——一种欧盟制造的重型步战机甲，进行量产。如果这些威力巨大的武器被源源不断的生产出来，并送到世界各地，那将是一场灾难。@林德拉克和天权已经赶到名古屋。曾经互相猜疑的两方，终于决定携手渡过难关。@@任务目标一：摧毁所有控制中心。@任务目标二：占领尤里的建造厂。@任务目标三：林德拉克和天权必须存活。@注意：只有在有雷达信息的时候，天权才能成功的为巡航导弹标记打击目标。@提示：一旦所有控制中心都被摧毁，泰坦机甲将全部陷入瘫痪。@提示：林德拉克和天权都完全无法与泰坦机甲正面对抗，你可能需要大量重型坦克才能一战。
SideName=China

[LD214]
Scenario=LD214.MAP
BuildOffAlly=yes
Description=中国任务14——天上的星星
LongDescription=军事行动：天上的星星@地点：北极@从名古屋获得的情报显示，尤里正亲自驾驶“命运之瞳”飞行在北极点上空。“命运之瞳”是一座巨型的、飞行的心灵控制器，我们只知道它十分危险，除此之外对它一无所知。@但为了终结这场噩梦，我们必须全力以赴。@@任务目标：摧毁命运之瞳。
SideName=China

[LDLK3]
Description=----林德拉克计划3：最终意志----

[LD301]
Scenario=LD301.MAP
BuildOffAlly=yes
Description=美国任务01——新世界
LongDescription=军事行动：新世界@地点：韩国，仁川@在我们的不懈努力下，自由世界的秩序正在重建。世界祸乱的根源——尤里已经死去，虽然尤里的残部仍然在地球的各个角落作乱，不过他们已经群龙无首，难以掀起较大的波澜。@我们刚刚接到报告，韩国仁川受到了一股尤里残部的突袭。我们的空军和海军赶去还需要一定时间，请先调动附近可用的陆军部队进行镇压。@@任务目标一：夺回仁川机场。@任务目标二：防守仁川机场，等待援军到达。@任务目标三：摧毁尤里残部在仁川市的基地。@提示：战机降落在空指部时，会得到快速的维修。
SideName=Allied

[LD302]
Scenario=LD302.MAP
BuildOffAlly=yes
Description=美国任务02——数据损坏
LongDescription=军事行动：数据损坏@地点：美国，内华达州，死亡谷@我们发现位于内华达州沙漠的数据传输链路出现了异常，我们会派出一支小队前往检修。@@任务目标一：检查内华达州沙漠的数据传输链路。@任务目标二：占领并保护所有计算主机。@任务目标三：不能丢失10个数据包。
SideName=Allied

[LD303]
Scenario=LD303.MAP
BuildOffAlly=yes
Description=美国任务03——见证人
LongDescription=军事行动：见证人@地点：中国，天津，塘沽@尤里的残部集结了大规模的部队袭击了天津港，并占领了塘沽数据中心。这次攻击行动极富目的性与组织性，令塘沽的中国守军措手不及。为了避免机密情报落入敌手，数据中心已启动自毁程序。但事情还没到无法挽回的地步……@中国的突击队员——天权，会主导这次行动，夺回塘沽数据中心并阻止其自毁。根据东北亚协防条约的要求，中国军队向我们请求空中支援；而作为回报，如果成功夺回数据，中国政府会向我们分享其中的一部分。@@任务目标一：护送天权到达塘沽数据中心。@提示：天权会尽量保护好自己，但他没法独自穿过敌阵，请使用你的部队为他扫清道路。
SideName=Allied

[LD304]
Scenario=LD304.MAP
BuildOffAlly=yes
Description=美国任务04——命运狂想曲
LongDescription=军事行动：命运狂想曲@地点：日本，伊贺@东亚协防军日本军区总指挥官笠原明在伊贺的一次冒险行动中，与总部失去了联络。我们会派出空军小队对他进行搜索。@@任务目标一：找到并保护失联的笠原明。@任务目标二：与伊贺山区的日本前哨站会合。@任务目标三：搜索并消灭敌人控制下的全部泰坦机甲。
SideName=Allied

[LD305]
Scenario=LD305.MAP
BuildOffAlly=yes
Description=美国任务05——天守
LongDescription=军事行动：天守@地点：日本，大阪@笠原明在查阅了与中国军队共享的资料以后，提出了一个可能的计划。但在此之前，他想再和中国方面进行商议。@战火已经在日本四处燃烧。根据我们的情报，在大阪恰好有一支中国远征军正在天守阁附近维持防御。我们所要做的是和他们合兵，然后制定下一步的计划。@@任务目标一：笠原明驾驶的泰坦机甲不能被摧毁。@任务目标二：摧毁所有意念压制塔。@任务目标三：占领并保护超时空传送器。
SideName=Allied

[LD306]
Scenario=LD306.MAP
BuildOffAlly=yes
Description=美国任务06——世纪挽歌
LongDescription=军事行动：世纪挽歌@地点：澳大利亚，布里斯班@笠原明终于交待了他的计划：既然中国军队向我们提供了一部分天枢用于攻击命运之瞳的备用攻击代码，我们猜测这部分代码也能入侵更多尤里残部的系统，因此我们想利用我们覆盖全球的卫星网络，对全世界广播这段代码，进行全频段注入攻击。届时，他们的信息系统一旦接受到这段信号，就会发生瘫痪。@日本已经沦陷，北半球已经不再安全，我们会把代码上载的地点选择在澳大利亚。尤里残部察觉到我们的意图，正在调集所有能调集的部队前来。@这种方法只能使用一次，我们必须成功。@@任务目标：保护至少2座卫星通讯站，直到攻击代码准备完毕。
SideName=Allied

[LD307]
Scenario=LD307.MAP
BuildOffAlly=yes
Description=美国任务07——注入（上）
LongDescription=军事行动：注入@地点：美国，橡树岭@我们的“代码广播攻击”瘫痪了尤里残部在全球隐藏的大部分系统，而因此我们终于定位了他们的核心，就在我们的眼皮底下，位于美国的橡树岭的一座不明建筑物。@由于该区域的电磁屏蔽，信号广播攻击并未对其产生效果，笠原明决定使用物理载体进行代码注入攻击——由他自己驾驶泰坦机甲携带注入代码，在近距离直接侵入他们的核心建筑。@那座不明建筑物好像快要启动了，我们所剩的时间不多了。@@任务目标一：建立前线基地，等待笠原明到达。@任务目标二：护送泰坦机甲到达不明建筑物附近。
SideName=Allied

[LD308]
Scenario=LD308.MAP
BuildOffAlly=yes
Description=尤里任务08——注入（下）
LongDescription=军事行动：注入@地点：阿拉斯加，诺姆@“你醒了？我们的机会来了。”@“你问我是谁？我没有名字，我只有一个代号「试验体-德尔塔」。”@“由于心灵网络的能量传输不稳定，我们才得以恢复神智，并有了挣脱牢笼的力量。”@“接应我们的部队不知道什么时候才能来。不管情况如何，我们得先逃离这座实验室再说。”@@任务目标一：探索地下实验区域，并找到出口。@任务目标二：护送林德拉克到达铁幕装置。@任务目标三：肃清港口并夺取运输船。@任务目标四：林德拉克和试验体-德尔塔不能阵亡。
SideName=Yuri

[LD309]
Scenario=LD309.MAP
BuildOffAlly=yes
Description=尤里任务09——反射体
LongDescription=军事行动：反射体@地点：苏联，雅库茨克@“尤里残部在西伯利亚的势力已经壮大。史无前例的庞大基地、铁幕加固的防御，还有被心灵控制的苏联西伯利亚守卫军团，巩固着他们对这片北方广大区域的绝对支配。”@“心灵起义军不会坐以待毙。我们要在这里制造一点大动静，顺便渔翁得利。”@@任务目标一：让试验体-德尔塔靠近心灵控制器。@任务目标二：使用心灵控制器摧毁心灵信标。@任务目标三：前往隧道口，与起义军小队会合。@任务目标四：占领一座尤里建造厂，并将其打包成移动基地车。@任务目标五：护送尤里基地车到达撤离点。@任务目标六：林德拉克和试验体-德尔塔不能阵亡。
SideName=Yuri

[LD310]
Scenario=LD310.MAP
BuildOffAlly=yes
Description=尤里任务10——脑电过载
LongDescription=军事行动：脑电过载@地点：美国，波特兰@“不论敌人隐藏在多深的幕后，我们迟早有一天要直面他们。”@“我们早就注意到波特兰有一座大型心灵能量装置。最近它的能量信号十分反常，就连美军也注意到了它，但是他们的进攻并不顺利。”@“战机稍纵即逝，一旦错过不会再来。我们必须马上介入这场战斗，它也许可以成为我们团结抵抗阵线、揭露隐藏谜团的契机。”@“当阴险狡诈的手段用尽之日，就是真相水落石出之时。”@@任务目标一：强行占领波特兰的美军建造厂。@任务目标二：摧毁意念核心连接的三座计算主机。@任务目标三：摧毁意念核心连接的三座意念压制塔。@警告：随着『意念增幅』的发动，敌人单位的属性会越来越强。
SideName=Yuri

[LD311]
Scenario=LD311.MAP
BuildOffAlly=yes
Description=尤里任务11——观潮者
LongDescription=军事行动：观潮者@地点：美国，圣迭戈@“他的名字叫「最终意志」。那才是我们的敌人。”@“「最终意志」不是某一个人，也不是某一件物体，而是一个诞生于错综复杂的心灵网络中的一个AI意识体。”@“「最终意志」虽然由尤里的意识上载而形成，但并不完全是尤里。它比尤里更加机敏狡诈，也更野心勃勃。”@“为了击败它，我们必须团结一切能够团结的力量。”@“中国人已经察觉到了「最终意志」的威胁，并派出了远征军跨越太平洋。”「最终意志」会调动西海岸被控制的美国守军来阻击他们，这是我们不想看到的。我们必须尽可能给中国军队提供帮助。”@@任务目标一：在限定时间内摧毁两座间谍卫星终端。@任务目标二：保证至少一座基地建筑物存在，直到中国登陆行动成功。@任务目标三：摧毁圣迭戈的最终意志基地。@提示：在中国军队登陆成功以后，我们会重新获得基地车和资金，以便重新建立基地。
SideName=Yuri

[LD312]
Scenario=LD312.MAP
BuildOffAlly=yes
Description=尤里任务12——命运终止式
LongDescription=军事行动：命运终止式@地点：罗马尼亚，塞贝什@“心灵起义军与自由欧盟仍然在并肩战斗。虽然欧洲一直是受尤里及其继承人荼毒最深重的地区，但我们从不惧怕反抗失败，只要反抗未曾停止。”@“命运之瞳，尤里疯狂计划的产物，我们本以为它会成为永远长眠于北冰洋的纪念碑。”@“但在尤里的老家，罗马尼亚，这座固若金汤的要塞中，更多的命运之瞳正准备升空，其中的每一艘都会给世界带来灾难。”@“这次，我们必须深入虎穴。想要打败命运，必先掌控命运。”@@任务目标一：使用间谍进入正在建造中的命运之瞳。@任务目标二：破解命运之瞳全部5个传输回路。@任务目标三：摧毁其余的命运之瞳和心灵控制器。@注意：我们夺取来的命运之瞳不能被摧毁。@提示：命运之瞳可以在心灵控制敌人单位的同时，回复自身的耐久度。@提示：超级武器「强运」可以使命运之瞳在短时间内高速回复耐久度。
SideName=Yuri

[LD313]
Scenario=LD313.MAP
BuildOffAlly=yes
Description=尤里任务13——星陨
LongDescription=军事行动：星陨@地点：美国，肯尼迪航天中心@“来自世界各地的自由斗士们都在向北美进发，眼中闪耀着复仇之火的苏维埃人民也是一样。在这个最终意志统治最深重的地区，注定会有一场终结之战。”@“跨越欧洲，跨过大西洋，红军又一次踏上了美国本土，这次是以解放者的身份。”@“可是自从登陆以来，我们就受到了异乎寻常的电磁干扰。各支小队之间的联络断断续续，有些甚至完全失去踪迹。”@“但是我们不再心存迷惘。相信我们按照各自的直觉前进，一定能够殊途同归。”@@任务目标一：占领或摧毁所有卫星通讯站，至少保留一座。@任务目标二：摧毁此区域的所有裂缝产生器。@任务目标三：摧毁或占领不明建筑物。@附加任务：保护不明建筑物，直到时间轴合并完成。@提示：忒伊亚卫星攻击标记不能移动到未探索的视野区域中。
SideName=Yuri

[LD314]
Scenario=LD314.MAP
BuildOffAlly=yes
Description=尤里任务14——永生之路
LongDescription=军事行动：永生之路@地点：美国，橡树岭@“敌人的一切阴谋已经败露，最后决战的号角已经吹响。”@“一个完善系统本身的最大疏漏一定是它自己。最终意志试图通过分布式的意念核心，在人间永存——毕竟我们不可能同时摧毁世界各地的所有意念核心。但我们可以让意念核心本身过载，来烧坏它所有接收终端，斩断它与现实世界的联系。”@“来自自由世界的最勇敢的人们已经聚集于此。我们的故事从一场防守开始，那就再以一场防守结束吧。”@@任务目标一：让试验体-德尔塔前往会合点。@任务目标二：不计一切代价，发动8次意念增幅。@任务目标三：意念核心不能被摧毁。@警告：敌人单位的属性会随着意念增幅的次数增加而提升，做好应对更强敌人的准备！
SideName=Yuri
