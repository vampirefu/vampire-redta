LongDescription=军事行动：脑死@地点：南极洲@指挥官，一切都要结束了，尤里的阴谋都将化为乌有。然而，他在南极的某地仍拥有一座仅存的心灵控制器。请将火地岛上的废弃苏联基地重新启用，并建立一座雷达。如此我们就能侦测到尤里的确实位置。之后再联合联军及苏联的军队，来结束尤里的阴谋。@@任务目标一：建造苏联雷达@任务目标二：摧毁南极的心灵控制器@任务目标三：摧毁所有的尤里军队
